[server]
host = "0.0.0.0"
port = 11300
# api_key = "ep_..." # Auto-generated on first `configsetup`; use `eggpool newkey` to regenerate
log_level = "INFO"
access_log = true

[upstream]
base_url = "https://opencode.ai/zen/go/v1"
connect_timeout_s = 5
read_timeout_s = 300
write_timeout_s = 30
max_connections = 100
max_keepalive = 20
keepalive_timeout_s = 30

[database]
path = "usage.sqlite3"
busy_timeout_ms = 5000
wal = true
synchronous = "NORMAL"
# aiosqlite uses one worker thread per SQLite connection. Default 1 keeps
# the process small; set to 2 to add a read-only stats/dashboard connection.
worker_threads = 1

[models]
# How often to refresh the model catalog from upstream providers (seconds).
# Also serves as the provider ping interval — each GET /models call measures
# latency and records health data.
refresh_interval_s = 300
expose_mode = "union"
startup_refresh = true
stale_after_s = 7200
allow_stale_catalog = true
# How many days to retain provider ping data.
ping_retain_days = 7
# collapse_models = false  # when true, a base model exposed by multiple
#                          # providers is collapsed to a single unsuffixed
#                          # ID and routed across all of them. Default false
#                          # emits one provider-suffixed entry per provider.
# Catalog withdrawal policy controls whether a live refresh can remove
# an account/model support row that the cache previously knew about.
# Default "preserve_until_health" never de-pools on catalog uncertainty:
# only explicit health/config state (auth failure, quota exhaustion,
# rate-limit, cooldown, circuit open, account disabled) suppresses
# routing. "confirmed_once" allows a successful authoritative non-empty
# refresh that omits a model to remove that account/model support.
# "confirmed_twice" requires two consecutive authoritative omissions.
# Default is correct for subscription aggregation: a flaky /models
# response or transient upstream parse error must not silently de-pool
# a healthy subscription account.
catalog_withdrawal_policy = "preserve_until_health"

# ─── Protocol Transcoding ────────────────────────────────────────────
# Transcoding is **on by default**. Requests from clients using one
# protocol (OpenAI or Anthropic) are automatically forwarded to upstream
# accounts whose provider declares only the other protocol. EggPool
# translates the request body, the streaming SSE events, and the response
# body bidirectionally. The `[transcoder]` block is optional and rarely
# needs to be touched.
#
# Use this when you want to mix protocol-native and protocol-transcoded
# accounts (e.g. opencode-go native plus MiniMax International
# Anthropic-only, both reachable from OpenCode clients).
#
# The `enabled` flag is a DEPRECATED escape hatch for operators who need
# to disable translation (for example, while diagnosing routing issues).
# Setting `enabled = false` reverts to legacy protocol-exact routing:
# cross-protocol requests will fail with HTTP 400. This option will be
# removed in a future release.
[transcoder]
# enabled = false          # DEPRECATED escape hatch; defaults to true
loss_policy = "warn"      # "warn" or "reject" for loss-of-information
prefer_native = true      # prefer native-protocol accounts in routing

[routing]
strategy = "quota_fair"
near_tie_epsilon = 0.1
max_retries_before_stream = 3
unknown_request_reservation_microdollars = 1000000
inflight_penalty = 100000
health_penalty = 500000
randomize_near_ties = true
quota_exhausted_cooldown_seconds = 300
# Local quota mode controls whether locally estimated over-capacity
# usage hard-excludes accounts from routing or only affects rank.
# "score_only" (default) is safe for subscription aggregation: upstream
# 429/402/5xx remain the authoritative suppression signal and accounts
# above local quota still receive requests.
# "hard_cap" is an opt-in escape hatch that re-enables local quota as a
# hard eligibility gate (legacy pre-suppression behavior). Subscription
# aggregators should normally leave this as "score_only".
local_quota_mode = "score_only"
# Same-tier fairness for effectively tied accounts. Keeps equal subscription
# accounts from starving behind stable config order.
# "round_robin" (default): deterministic rotation across the fairness band.
# "random": choose randomly within the fairness band.
# "off": existing behavior; useful for debugging or strict lowest-score routing.
fairness_mode = "round_robin"
# Defaults to near_tie_epsilon when omitted.
# fairness_epsilon = 0.1
# Fairness scope controls which accounts share a rotation group:
# "provider_model_protocol" (default): separate rotor per provider, model, protocol, and priority tier.
# "provider_model": separate rotor per provider, model, and priority tier.
# "priority_model_protocol": co-balanced across providers sharing a model in the same priority tier.
fairness_scope = "provider_model_protocol"

[limits]
five_hour_microdollars = 12000000
weekly_microdollars = 30000000
monthly_microdollars = 60000000

# --- Pricing resolution ----------------------------------------------
# External pricing catalogs supplement upstream model metadata when
# providers do not include pricing in /v1/models responses. The per-catalog
# max_entries cap bounds steady-state RSS on SBC deployments.
[pricing]
fallback = "generic_estimate"

[pricing.catalogs]

[pricing.catalogs.openrouter]
enabled = true
priority = 100
ttl_seconds = 86400
# max_entries = 4096  # bound the in-memory catalog cache; oldest entries evict first
# base_url = "https://openrouter.ai/api/v1"
# api_key = "..."     # optional; only needed for higher rate limits

[pricing.catalogs.opencode_zen]
enabled = false
priority = 200
ttl_seconds = 86400
# max_entries = 4096  # bound the in-memory catalog cache; oldest entries evict first

# ─── Model Information ────────────────────────────────────────────────
# The model_info subsystem provides a persistent metadata sidecar for
# all known models. Source adapters enrich models with display names,
# context limits, benchmarks, and pipeline tags. Phase 5 adds
# Artificial Analysis and Hugging Face sources, manual overrides,
# and alias expansion.
# [model_info]
# enabled = true                   # enable model_info sidecar (default: true)
# include_in_models_endpoint = true  # compact fields in /v1/models (default: true)
# refresh_interval_s = 3600        # global refresh cadence (seconds)
# sparse_refresh_interval_s = 300  # accelerated refresh for sparse models (seconds)
# sparse_refresh_window_s = 86400  # how long sparse models get accelerated refresh (seconds)
# default_ttl_s = 604800           # default TTL for fresh models (7 days)
# partial_ttl_s = 259200           # TTL for partially-known models (3 days)
# sparse_ttl_s = 86400             # TTL for sparse models (1 day)
#
# [model_info.sources.openrouter]
# enabled = true                   # enable OpenRouter metadata source (default: true)
# priority = 100                   # higher = preferred when multiple sources agree
# ttl_seconds = 86400              # how long to cache the OpenRouter /models catalog
# # api_key = "..."                # optional; only needed for higher rate limits
#
# [model_info.sources.artificial_analysis]
# enabled = false                  # Artificial Analysis benchmark source (default: disabled)
# priority = 200
# ttl_seconds = 86400
# api_key = "..."                  # required; get from https://artificialanalysis.ai
#
# [model_info.sources.huggingface]
# enabled = false                  # Hugging Face model card metadata (default: disabled)
# priority = 300
# ttl_seconds = 86400
# # api_key = "..."                # optional; unauthenticated has 60 req/min
#
# ─── Manual Overrides ─────────────────────────────────────────────────
# Override canonical fields for specific models. Overrides take
# precedence over all source-provided values.
# [model_info.overrides."model-id"]
# display_name = "Custom Display Name"
# summary = "A custom summary for this model"
#
# ─── Alias Expansion ──────────────────────────────────────────────────
# Map canonical model IDs to alternative identifiers used by external
# sources. Source-specific aliases are matched during identity resolution.
# [model_info.aliases]
# "canonical-id" = ["alias-1", "alias-2"]

# ─── Network ─────────────────────────────────────────────────────────
# Outbound client transport tuning and DNS caching. The DNS cache wraps
# the default httpcore transport to cache resolved DNS entries in memory,
# reducing latency for repeated connections to the same upstream hosts.
# [network]
# connect_timeout_s = 5
# read_timeout_s = 300
# max_connections = 100
# max_keepalive = 20
# keepalive_expiry_s = 30
#
# [network.dns_cache]
# enabled = true                   # enable in-memory DNS cache (default: true)
# max_entries = 50                 # max cached host entries (default: 50)
# positive_ttl_seconds = 1800      # upper cap for positive DNS answers (default: 1800)
# negative_ttl_seconds = 30        # how long to cache lookup failures (default: 30)
# stale_if_error_seconds = 3600    # max age for stale records usable on resolver failure (default: 3600)
# prefer_ipv6 = false              # prefer IPv6 addresses in DNS resolution (default: false)
# lookup_timeout_seconds = 5       # timeout for DNS lookups in seconds (default: 5)

[dashboard]
enabled = true
public = true
# Theme name (without .toml extension). "default" uses GitHub Primer colors.
# Themes are from Halloy: https://themes.halloy.chat/
# Bundled themes (50+) ship inside the package — no extra files needed.
# To add custom themes, set themes_dir to a directory of .toml theme files.
# Custom themes are merged with the bundled set (same-name custom themes
# take precedence over bundled ones).
theme = "Cyber Red"
# themes_dir = "themes"  # Uncomment to add custom themes alongside bundled ones
retain_request_stats_days = 30
store_request_content = false
refresh_interval_s = 60

[metrics]
# Controls observability write buffering for reduced microSD wear.
# - "immediate": existing direct-write behavior (best for debugging).
# - "balanced" (default): buffer lossy analytics with short flush intervals.
# - "low_wear": longer flush interval, coarser buckets, optional trace
#   sampling — designed for microSD / Raspberry Pi deployments.
#
# Buffered analytics may lose at most flush_interval_s seconds of data
# after abrupt power loss. Correctness-critical request state (request
# rows, reservations, attempts, routing) is never buffered.
write_mode = "balanced"
flush_interval_s = 30
max_buffered_events = 500
timeseries_bucket_s = 60
trace_sample_rate = 1.0
aggregate_only = false
rollup_retain_days = 90
cleanup_interval_s = 86400
cleanup_max_rows_per_pass = 5000

# ─── Low-wear profile for microSD / Raspberry Pi ──────────────────
# Uncomment this block when running from microSD and dashboard traces
# are not critical. Trades detailed trace fidelity and dashboard
# freshness for materially fewer writes.
# [metrics]
# write_mode = "low_wear"
# flush_interval_s = 120
# max_buffered_events = 250
# timeseries_bucket_s = 300
# trace_sample_rate = 0.05
# aggregate_only = true
# rollup_retain_days = 90
# cleanup_interval_s = 86400
# cleanup_max_rows_per_pass = 5000

[security]
allowed_hosts = []
cors_origins = []
redact_headers = ["authorization", "x-api-key"]
persist_redacted_error_detail = false

# ─── Automatic Backups ────────────────────────────────────────────────
# EggPool creates automatic daily backups by default. Archives are
# restore-compatible .zip files stored under $XDG_BACKUP_HOME/eggpool
# (or ~/backups/eggpool). The eggpool deploy backup-cron path remains
# available for operators who prefer external scheduling.
# [backup]
# enabled = true
# interval_s = 86400           # every 24 hours
# retain_count = 14            # keep last 14 backups
# startup_delay_s = 300        # wait 5 min after boot before first backup
# # directory = "/path/to/backups"  # override default backup location
# include_env = true           # include .env file (may contain API keys)

# Optional outbound proxies. Omit this section for direct upstream connections.
# Values use pproxy URI syntax:
# https://pypi.org/project/pproxy/#uri-syntax
# Use url_env instead of url when the proxy URI contains credentials.
# [proxies.residential-us]
# url = "socks5://127.0.0.1:1080"
#
# [proxies.datacenter-eu]
# url_env = "GOROUTER_DATACENTER_EU_PROXY_URL"

# ─── Provider Accounts ─────────────────────────────────────────────────
# Use `eggpool connect` to add providers interactively. This is the
# recommended way to configure accounts — it handles API key storage,
# config file updates, and server reload automatically.
#
# Manual configuration is possible but not recommended. If you prefer
# editing this file directly, uncomment and customize the examples below.
# Authenticated providers need an `api_key` (inline) or `api_key_env` (env var
# name). Providers with `auth.mode = "none"` need neither.

# [providers.opencode-go]
# id = "opencode-go"
# base_url = "https://opencode.ai/zen/go/v1"
# protocols = ["openai", "anthropic"]
# routing_priority = 0  # higher = preferred; default 0 means "load balance
#                       # within this provider using the existing scorer".
#
# [[providers.opencode-go.accounts]]
# name = "personal"
# api_key = "sk-your-opencode-go-key"
# # Optional per-key proxy. Omit this field for the default direct connection.
# # proxy = "residential-us"
# # proxy_url = "ss://chacha20:password@proxy.example.com:8388"
# # proxy_url_env = "GOROUTER_PERSONAL_PROXY_URL"
#
# [providers.opencode-go.auth]
# mode = "bearer"
# header = "Authorization"
# scheme = "Bearer"
#
# # Provider-specific model context limits override upstream metadata.
# # Use the base model ID (not the provider-suffixed ID).
# [providers.opencode-go.model_overrides."MiniMax-M3"]
# max_context_tokens = 220000
# max_output_tokens = 16384
# enforce_context_limit = true


[server]
host = "127.0.0.1"
port = 8080
api_key_env = "GO_AGGREGATOR_API_KEY"
log_level = "INFO"
access_log = true

[upstream]
base_url = "https://opencode.ai/zen/go/v1"
connect_timeout_s = 5
read_timeout_s = 300
write_timeout_s = 30
max_connections = 100
max_keepalive = 20
keepalive_timeout_s = 30

[database]
path = "usage.sqlite3"
busy_timeout_ms = 5000
wal = true
synchronous = "NORMAL"

[models]
# How often to refresh the model catalog from upstream providers (seconds).
# Also serves as the provider ping interval — each GET /models call measures
# latency and records health data.
refresh_interval_s = 300
expose_mode = "union"
startup_refresh = true
stale_after_s = 7200
allow_stale_catalog = true
# How many days to retain provider ping data.
ping_retain_days = 7

[routing]
strategy = "quota_fair"
near_tie_epsilon = 0.1
max_retries_before_stream = 3
unknown_request_reservation_microdollars = 1000000
inflight_penalty = 100000
health_penalty = 500000
randomize_near_ties = true
quota_exhausted_cooldown_seconds = 300

[limits]
five_hour_microdollars = 12000000
weekly_microdollars = 30000000
monthly_microdollars = 60000000

[dashboard]
enabled = true
public = false
# Theme name (without .toml extension). "default" uses GitHub Primer colors.
# Available themes in the themes/ directory: catppuccin-mocha, catppuccin-latte,
# dracula, nord, gruvbox, one-dark, rose-pine, solarized-dark, kanagawa, etc.
theme = "Cyber Red"
themes_dir = "themes"
retain_request_stats_days = 30
store_request_content = false
refresh_interval_s = 60

[security]
allowed_hosts = []
cors_origins = []
redact_headers = ["authorization", "x-api-key"]
persist_redacted_error_detail = false

# Provider-based configuration (recommended)
[providers.opencode-go]
id = "opencode-go"
base_url = "https://opencode.ai/zen/go/v1"
protocols = ["openai", "anthropic"]

[[providers.opencode-go.accounts]]
name = "personal"
api_key_env = "OPENCODE_GO_KEY_1"

[[providers.opencode-go.accounts]]
name = "team"
api_key_env = "OPENCODE_GO_KEY_2"

# Backward-compatible flat config (auto-normalizes to opencode-go provider)
# [[accounts]]
# name = "personal"
# api_key_env = "OPENCODE_GO_KEY_1"

[model_overrides."claude-opus-4"]
protocol = "anthropic"

[model_overrides."claude-sonnet-4"]
protocol = "anthropic"

# providers.toml — Provider templates for `eggpool connect`
#
# Each [providers.<id>] block defines a provider that can be added
# to your config via the interactive `eggpool connect` command.
#
# The api_key_env value is a placeholder. When you connect, the
# actual environment variable name is derived from the provider id
# (e.g. MINIMAX_API_KEY for minimax).

[providers.opencode-go]
# OpenCode Go — primary provider
id = "opencode-go"
base_url = "https://opencode.ai/zen/go/v1"
protocols = ["openai", "anthropic"]
api_key_env = "API_KEY"
display_name = "OpenCode Go"
status = "verified"
category = "direct"
region = "US"
recommended = true
notes = "Primary provider; OpenAI + Anthropic protocols"

[providers.opencode-go.auth]
mode = "bearer"

[providers.opencode-go.verify]
probe_model = "gpt-5.5-mini"
probe_protocol = "openai"
require_models = true

[providers.minimax]
# MiniMax International — Anthropic-compatible endpoint for token-plan keys.
# Token-plan keys from minimax.io use the Anthropic-compatible transport
# (x-api-key + anthropic-version) at /anthropic/v1/messages, not the
# legacy OpenAI-compatible /v1/chat/completions surface. Live model
# discovery is supported via the documented /v1/models endpoint.
id = "minimax"
base_url = "https://api.minimax.io/anthropic"
protocols = ["anthropic"]
anthropic_path = "/v1/messages"
models_method = "GET"
models_path = "/v1/models"
api_key_env = "API_KEY"
display_name = "MiniMax International"
status = "experimental"
category = "direct"
region = "global"
recommended = false
notes = "Uses MiniMax Anthropic-compatible endpoint; live model discovery via /v1/models"

[providers.minimax.auth]
mode = "api_key"
header = "x-api-key"

[[providers.minimax.headers]]
name = "anthropic-version"
value = "2023-06-01"

[providers.minimax.models_endpoint]
method = "GET"
path = "/v1/models"
required = true

[providers.minimax.verify]
probe_model = "MiniMax-M3"
probe_protocol = "anthropic"
require_models = true

# MiniMax International serves its catalog through the documented
# /v1/models endpoint. The provider protocol constraint check accepts the
# anthropic value that the family mapping produces, so no static seeds
# are required for protocol pinning; live discovery is the source of
# truth and surfaces new MiniMax releases without template updates.
# If the live endpoint is temporarily unreachable the operator can drop
# fallback rows here, mirroring the live id / display_name exactly so the
# cache remains consistent (e.g. id = "MiniMax-M3",
# display_name = "MiniMax-M3" — note the "highspeed" variants use a
# capitalised display_name suffix like "MiniMax-M2.7-Highspeed").

[providers.minimax-cn]
# MiniMax China — live verification required before production use.
# Endpoint family and auth shape have not been confirmed against
# api.minimaxi.com; do not assume parity with the international
# Anthropic-compatible template without live testing.
id = "minimax-cn"
base_url = "https://api.minimaxi.com/v1"
protocols = ["openai"]
openai_path = "/chat/completions"
models_path = "/models"
api_key_env = "API_KEY"
display_name = "MiniMax China"
status = "experimental"
category = "direct"
region = "CN"
recommended = false
notes = "China endpoint; live verification required before production use"

[providers.minimax-cn.auth]
mode = "bearer"

[providers.minimax-cn.verify]
probe_model = "MiniMax-M2.5"
probe_protocol = "openai"
require_models = false

# MiniMax China serves the same model IDs as MiniMax International but
# via an OpenAI-compatible surface. Pin the protocol here so the global
# FAMILY_PROTOCOLS["minimax-"] = "anthropic" mapping does not clear the
# protocol during the provider protocol constraint check (see
# CatalogService._fetch_and_process_account). Without these seeds
# MiniMax-M* would be served with protocol = None and rejected at
# RequestCoordinator._validate_endpoint.
[[providers.minimax-cn.static_models]]
id = "MiniMax-M3"
display_name = "MiniMax-M3"
protocol = "openai"
supports_tools = true
supports_vision = false

[[providers.minimax-cn.static_models]]
id = "MiniMax-M2.7"
display_name = "MiniMax-M2.7"
protocol = "openai"
supports_tools = true
supports_vision = false

[[providers.minimax-cn.static_models]]
id = "MiniMax-M2.5"
display_name = "MiniMax-M2.5"
protocol = "openai"
supports_tools = true
supports_vision = false

